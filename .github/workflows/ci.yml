name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:e2e
        env:
          SHEETSDB_TEST_CLIENT_EMAIL: ${{ secrets.SHEETSDB_TEST_CLIENT_EMAIL }}
          SHEETSDB_TEST_PRIVATE_KEY: ${{ secrets.SHEETSDB_TEST_PRIVATE_KEY }}
          SHEETSDB_TEST_SPREADSHEET_ID: ${{ secrets.SHEETSDB_TEST_SPREADSHEET_ID }}
