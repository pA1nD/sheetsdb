name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx tsc --noEmit

  e2e:
    name: E2E Tests
    runs-on: self-hosted
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run test:e2e
        env:
          SHEETSDB_TEST_CLIENT_EMAIL: ${{ secrets.SHEETSDB_TEST_CLIENT_EMAIL }}
          SHEETSDB_TEST_PRIVATE_KEY: ${{ secrets.SHEETSDB_TEST_PRIVATE_KEY }}
          SHEETSDB_TEST_SPREADSHEET_ID: ${{ secrets.SHEETSDB_TEST_SPREADSHEET_ID }}
